name: Build And Publish Frontend

on:
  workflow_dispatch: # manual only trigger and tags with latest version
  release:
    types: [published] # triggers when "Publish Release" and tags image with release version

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (For ARM CPU architecture for PI)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MOKZ99_GHCR }}

      # Sets up tags based on manual or release trigger
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.actor }}/mokznet-frontend
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}

      # i have linked my personal package for this to the repo, so it shows up here: 
      # https://github.com/mokz99/MokzNet/pkgs/container/mokznet-frontend
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm/v7,linux/arm64
          push: true
          # takes data from stage above
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
