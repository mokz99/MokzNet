name: Build And Publish Backend

# this workflow is run manually, not automated
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (For ARM CPU architecture for PI)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MOKZ99_GHCR }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/arm/v7,linux/arm64
          push: true
          # i have linked my personal package for this to the repo, so it shows up here: 
          # https://github.com/mokz99/MokzNet/pkgs/container/mokznet-backend
          tags: ghcr.io/${{ github.actor }}/mokznet-backend:latest
